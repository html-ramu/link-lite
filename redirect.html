<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting – Link Lite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- DARK MODE TOPBAR -->
    <div class="topbar">
        <button id="themeToggle">🌙 Dark Mode</button>
    </div>

    <div class="container redirect-page">
        <h1>🔄 Redirecting...</h1>
        <p id="status">Please wait...</p>
        <p class="small-text">
            Not redirected? <a href="index.html">Go back to home</a>
        </p>
    </div>

    <script src="redirect.js"></script>

    <!-- Dark mode toggle logic -->
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const saved = localStorage.getItem('linkLiteTheme');

        if (saved === 'dark') {
            document.body.classList.add('dark');
            if (themeToggle) themeToggle.textContent = '☀️ Light Mode';
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', function () {
                const isDark = document.body.classList.toggle('dark');
                themeToggle.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
                localStorage.setItem('linkLiteTheme', isDark ? 'dark' : 'light');
            });
        }
    </script>

</body>
</html>
